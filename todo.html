<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>To-Do App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      min-height: 100vh;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      padding: 28px 24px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 20px;
      color: #1a1a1a;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }

    input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      font-size: 15px;
      border: 1px solid #ddd;
      border-radius: 8px;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: #6c63ff;
    }

    button.add-btn {
      padding: 10px 18px;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
    }

    button.add-btn:hover { background: #574fd6; }

    .filters {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }

    .filters button {
      padding: 5px 14px;
      font-size: 13px;
      border: 1px solid #ddd;
      border-radius: 999px;
      background: none;
      cursor: pointer;
      color: #555;
    }

    .filters button.active {
      background: #6c63ff;
      color: #fff;
      border-color: #6c63ff;
    }

    ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid #eee;
      border-radius: 8px;
      background: #fafafa;
    }

    li.done { opacity: 0.55; }

    li input[type="checkbox"] {
      width: 17px;
      height: 17px;
      cursor: pointer;
      accent-color: #6c63ff;
    }

    li .task-text {
      flex: 1;
      font-size: 15px;
      color: #1a1a1a;
    }

    li.done .task-text {
      text-decoration: line-through;
      color: #999;
    }

    li .del-btn {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: #bbb;
      line-height: 1;
    }

    li .del-btn:hover { color: #e74c3c; }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
      font-size: 13px;
      color: #888;
    }

    .clear-btn {
      background: none;
      border: none;
      color: #e74c3c;
      font-size: 13px;
      cursor: pointer;
    }

    .empty {
      text-align: center;
      color: #aaa;
      font-size: 14px;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 My Tasks</h1>

    <div class="input-row">
      <input type="text" id="taskInput" placeholder="Add a new task..." />
      <button class="add-btn" onclick="addTask()">Add</button>
    </div>

    <div class="filters">
      <button class="active" onclick="setFilter('all', this)">All</button>
      <button onclick="setFilter('active', this)">Active</button>
      <button onclick="setFilter('done', this)">Done</button>
    </div>

    <ul id="taskList"></ul>
    <p class="empty" id="emptyMsg">No tasks yet — add one above!</p>

    <div class="footer">
      <span id="badge">0 tasks left</span>
      <button class="clear-btn" onclick="clearDone()">Clear done</button>
    </div>
  </div>

  <script>
    let tasks = [
      { id: 1, text: 'Buy groceries', done: false },
      { id: 2, text: 'Read a book', done: false },
      { id: 3, text: 'Go for a walk', done: true }
    ];
    let filter = 'all';
    let nextId = 4;

    function render() {
      const list = document.getElementById('taskList');
      const empty = document.getElementById('emptyMsg');
      const badge = document.getElementById('badge');

      const visible = tasks.filter(t =>
        filter === 'all' ? true : filter === 'done' ? t.done : !t.done
      );

      list.innerHTML = '';
      visible.forEach(t => {
        const li = document.createElement('li');
        li.className = t.done ? 'done' : '';
        li.innerHTML = `
          <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle(${t.id})" />
          <span class="task-text">${t.text}</span>
          <button class="del-btn" onclick="remove(${t.id})">✕</button>
        `;
        list.appendChild(li);
      });

      const left = tasks.filter(t => !t.done).length;
      badge.textContent = left + (left === 1 ? ' task left' : ' tasks left');
      empty.style.display = visible.length === 0 ? 'block' : 'none';
    }

    function addTask() {
      const input = document.getElementById('taskInput');
      const text = input.value.trim();
      if (!text) return;
      tasks.unshift({ id: nextId++, text, done: false });
      input.value = '';
      setFilter('all', document.querySelector('.filters button'));
      render();
    }

    function toggle(id) {
      tasks = tasks.map(t => t.id === id ? { ...t, done: !t.done } : t);
      render();
    }

    function remove(id) {
      tasks = tasks.filter(t => t.id !== id);
      render();
    }

    function clearDone() {
      tasks = tasks.filter(t => !t.done);
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    document.getElementById('taskInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });

    render();
  </script>
</body>
</html>
